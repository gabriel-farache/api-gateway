# DCM API Gateway and managers. Manager images are pulled from quay.io/dcm-project.
#
# Credentials: set POSTGRES_USER and POSTGRES_PASSWORD in the environment or in
# a .env file (see .env.example). Defaults are for local dev only.

# Shared DB connection env (YAML anchor); services merge it with <<: *db-common and add DB_NAME.
x-db-common: &db-common
  DB_TYPE: pgsql
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_USER: ${POSTGRES_USER:-admin}
  DB_PASS: ${POSTGRES_PASSWORD:-adminpass}
  DB_PASSWORD: ${POSTGRES_PASSWORD:-adminpass}

services:
  gateway:
    image: docker.io/krakend:2.13.1
    command: ["run", "-c", "/etc/krakend/krakend.json"]
    ports:
      - "9080:9080"
    volumes:
      - ./config/krakend.json:/etc/krakend/krakend.json:ro
    depends_on:
      service-provider-manager: { condition: service_started }
      catalog-manager: { condition: service_started }
      policy-manager: { condition: service_started }
      placement-manager: { condition: service_started }

  postgres:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-adminpass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./hack/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  opa:
    image: docker.io/openpolicyagent/opa:latest-static
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
    volumes:
      - policy_policies:/policies

  service-provider-manager:
    image: quay.io/dcm-project/service-provider-manager:latest
    environment:
      <<: *db-common
      DB_NAME: service-provider
      SVC_ADDRESS: ":8080"
    expose:
      - "8080"
    depends_on:
      postgres: { condition: service_healthy }

  catalog-manager:
    image: quay.io/dcm-project/catalog-manager:latest
    environment:
      <<: *db-common
      BIND_ADDRESS: ":8080"
      DB_NAME: catalog-manager
      PLACEMENT_MANAGER_URL: "http://placement-manager:8080"
    expose:
      - "8080"
    depends_on:
      postgres: { condition: service_healthy }

  policy-manager:
    image: quay.io/dcm-project/policy-manager:latest
    environment:
      <<: *db-common
      BIND_ADDRESS: ":8080"
      LOG_LEVEL: info
      DB_NAME: policy-manager
      OPA_URL: "http://opa:8181"
      OPA_TIMEOUT: "10s"
    expose:
      - "8080"
    depends_on:
      postgres: { condition: service_healthy }
      opa:
        condition: service_started

  placement-manager:
    image: quay.io/dcm-project/placement-manager:latest
    environment:
      <<: *db-common
      BIND_ADDRESS: ":8080"
      DB_NAME: placement-manager
      POLICY_MANAGER_EVALUATION_URL: "http://policy-manager:8081"
      SP_RESOURCE_MANAGER_URL: "http://service-provider-manager:8080"
    expose:
      - "8080"
    depends_on:
      postgres: { condition: service_healthy }

volumes:
  postgres_data: {}
  policy_policies: {}